server:
  # 8081: no Windows a porta 8080 costuma ser ocupada por serviços de fabricante (ex.: MTAgentService)
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agentspool}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update

app:
  sandbox-dir: ${SANDBOX_DIR:${user.home}/agents-pool-sandbox}
  hermes-base-url: ${HERMES_BASE_URL:}
  hermes-api-key: ${HERMES_API_SERVER_KEY:}
  openclaw-base-url: ${OPENCLAW_BASE_URL:}
  openclaw-api-key: ${OPENCLAW_GATEWAY_TOKEN:}
